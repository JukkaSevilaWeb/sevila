<!doctype html>
<html lang="sv">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Analog klocka - World Timer</title>
    <style>
        :root{
            /* MÖRKT TEMA (standard) */
            --bg:#0f1724;
            --face:#0b1220;
            --mark:#94a3b8;
            --hand-hour:#e6eef8;
            --hand-minute:#cfe6ff;
            --hand-second:#ff6b6b;
            --glass:rgba(255,255,255,0.03);
            --shadow-external:0 25px 50px rgba(0,0,0,1);
            --shadow-internal-light:inset 0 10px 30px rgba(255,255,255,0.08);
            --shadow-internal-dark:inset 0 -10px 30px rgba(0,0,0,0.5);
            
            --window-bg:var(--bg);
            --window-border:rgba(255,255,255,0.1); 
            --main-bg-end:#071023; 
            --moon-shadow-color:var(--face);
        }
        
        body.light-mode {
            --bg:#f0f4f8; 
            --face:#ffffff; 
            --mark:#64748b; 
            --hand-hour:#334155; 
            --hand-minute:#475569;
            --hand-second:#ff6b6b; 
            --glass:rgba(0,0,0,0.03); 
            --shadow-external:0 15px 30px rgba(0,0,0,0.2); 
            --shadow-internal-light:inset 0 10px 30px rgba(255,255,255,0.8); 
            --shadow-internal-dark:inset 0 -10px 30px rgba(0,0,0,0.1); 
            --window-bg:var(--face);
            --window-border:rgba(0,0,0,0.1); 
            --main-bg-end:#e3e9f0; 
            --moon-shadow-color:var(--face);
        }

        *{box-sizing:border-box}
        html,body{
            height:100%;
            margin:0;
            font-family:Inter, system-ui, -apple-system, sans-serif;
            color:var(--hand-minute);
            background:linear-gradient(180deg,var(--bg) 0%, var(--main-bg-end) 100%);
            display:flex;
            align-items:center;
            justify-content:center;
            transition: background 0.5s ease; 
        }

        .wrap{display:grid;gap:24px;place-items:center;padding:28px}

        .clock{
            width:360px;height:360px;
            border-radius:50%;
            background:radial-gradient(circle at 35% 25%, var(--glass), transparent 25%), var(--face);
            box-shadow: var(--shadow-external), var(--shadow-internal-light), var(--shadow-internal-dark);     
            position:relative;
            display:grid;
            place-items:center;
        }

        .dial{position:relative;width:88%;height:88%;border-radius:50%;display:block}

        /* Datumfönster (minskad storlek enligt önskemål) */
        .date-window, .day-window, .year-window { 
            position:absolute;
            background:var(--window-bg); 
            color:var(--hand-hour);
            border:1px solid var(--window-border); 
            border-radius:3px;
            font-size:12px; 
            font-variant-numeric:tabular-nums;
            display:flex;
            align-items:center;
            justify-content:center;
            left:50%; top:50%;
            z-index: 2; 
            text-align: center; 
            padding: 2px 4px; 
        }
        
        .date-window{ width:32px; height:20px; transform:translate(52px, -50%); }
        .day-window{ width:32px; height:20px; transform:translate(-88px, -50%); }
        .year-window{ width:46px; height:20px; bottom: 37.5%; left: 50%; top: unset; transform: translate(-50%, 50%); }

        /* Zon-display (utan ram) */
        .zone-display {
            position:absolute; 
            background: none; border: none; 
            width: 70px; height: 18px; 
            bottom: 29%; left: 50%; top: unset;
            transform: translate(-50%, 50%);
            font-size: 10px; font-weight: bold;
            letter-spacing: 0.5px;
            color: var(--hand-second); 
            z-index: 2; display:flex; 
            align-items:center; justify-content:center;
        }

        .moon-window {
            position: absolute;
            width: 36px; height: 36px; border-radius: 50%;
            background: var(--window-bg); border: 2px solid var(--mark);
            left: 50%; top: calc(37.5% - 15px - 3px); 
            transform: translate(-50%, -50%);
            overflow: hidden; z-index: 2;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.5);       
        }
        
        .moon-disk {
            width: 100%; height: 100%; border-radius: 50%;
            background-color: #f6e0b5; 
            box-shadow: inset 0 0 5px rgba(0,0,0,0.4); 
            transform-origin: center center;
        }
        
        .mark{ position:absolute; left:0; top:0; width:100%; height:100%; transform-origin:50% 50%; } 
        .mark .tick{ position:absolute; left:50%; top:3%; width:3px; height:12px; background:var(--mark); transform:translateX(-50%); border-radius:1px }
        .mark .min-tick{ position:absolute; left:50%; top:3%; width:1px; height:8px; background:var(--mark); opacity: 0.6; transform:translateX(-50%); border-radius:0.5px; }
        .mark .num{ position:absolute; left:50%; top:12%; font-size:18px; color:var(--mark); user-select:none; text-align:center; margin-left: -8px; width: 16px; text-shadow: -1px -1px 2px rgba(255,255,255,0.15), 1px 1px 3px rgba(0,0,0,0.8); }
        
        .hand{ position:absolute; left:50%; top:50%; transform-origin:50% 100%; border-radius:44px }
        .hand.hour{ width:8px; height:90px; background:linear-gradient(180deg,var(--hand-hour),rgba(255,255,255,0.03)); z-index:3; box-shadow: 0 8px 16px rgba(0,0,0,0.8); }
        .hand.minute{ width:6px; height:125px; background:linear-gradient(180deg,var(--hand-minute),rgba(255,255,255,0.03)); z-index:4; box-shadow: 0 8px 16px rgba(0,0,0,0.8); }
        .hand.second{ width:2px; height:150px; background:var(--hand-second); z-index:5; box-shadow: 0 4px 8px rgba(0,0,0,0.7); }

        .pin{ position:absolute; width:14px; height:14px; border-radius:50%; background:var(--hand-minute); left:50%; top:50%; transform:translate(-50%,-50%); box-shadow: 0 5px 15px rgba(0,0,0,1), inset 0 2px 4px rgba(255,255,255,0.4); }

        .controls{ display:flex; gap:12px; align-items:center; flex-wrap: wrap; justify-content: center; }
        .digital{ font-variant-numeric:tabular-nums; background:rgba(255,255,255,0.03); padding:8px 12px; border-radius:8px; color:var(--hand-minute); font-size: 0.9rem; }
        .btn{ background:transparent; border:1px solid rgba(255,255,255,0.1); padding:8px 10px; border-radius:8px; color:var(--mark); cursor:pointer; font-size: 0.85rem; }
        .btn:active{ transform:translateY(1px) }
        
        @media (max-width:420px){
            .clock{width:280px;height:280px}
            .hand.minute{height:98px}
            .hand.hour{height:72px}
            .hand.second{height:118px}
            .controls { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <section class="clock" aria-label="Analog klocka">
            <div class="dial" id="dial">
                <div class="date-window" id="date-window">--</div>
                <div class="day-window" id="day-window">--</div>
                <div class="year-window" id="year-window">----</div>
                <div class="zone-display" id="zone-display">Sthlm</div> 
                <div class="moon-window">
                    <div class="moon-disk" id="moon-disk"></div>
                </div>
                <div class="hand hour" id="hour"></div>
                <div class="hand minute" id="minute"></div>
                <div class="hand second" id="second"></div>
                <div class="pin"></div>
            </div>
        </section>

        <div class="controls">
            <div class="digital" id="digital">--:--:--</div>
            <button class="btn" id="toggleZone">Zon: Sthlm</button> 
            <button class="btn" id="toggleFormat">Format: Romerska</button>
            <button class="btn" id="toggleSec">Dölj sekundvisare</button>
            <button class="btn" id="toggleTheme">Tema: Ljust</button>
        </div>
    </main>

    <script>
        const hourHand = document.getElementById('hour');
        const minuteHand = document.getElementById('minute');
        const secondHand = document.getElementById('second');
        const digital = document.getElementById('digital');
        const zoneDisplay = document.getElementById('zone-display'); 
        const moonDisk = document.getElementById('moon-disk'); 

        // TIDSZONER MED IANA-NAMN (Hanterar sommar/vintertid automatiskt)
        const timeZones = [
            { name: "Stockholm", abbr: "Sthlm", tz: "Europe/Stockholm" },
            { name: "London", abbr: "LDN", tz: "Europe/London" },
            { name: "New York", abbr: "NYC", tz: "America/New_York" },
            { name: "Tokyo", abbr: "TYO", tz: "Asia/Tokyo" },
            { name: "Dubai", abbr: "DXB", tz: "Asia/Dubai" },
            { name: "Los Angeles", abbr: "LAX", tz: "America/Los_Angeles" }
        ];
        
        let currentZoneIndex = 0;
        let useRoman = true;
        let showSecond = true;

        const romanNumerals = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];
        const WEEKDAYS_SV = ["Sön", "Mån", "Tis", "Ons", "Tor", "Fre", "Lör"];

        function createDialMarks(isRoman) {
            const dial = document.getElementById('dial');
            document.querySelectorAll('.mark').forEach(m => m.remove());
            for(let i = 1; i <= 60; i++) {
                const rotation = i * 6;
                const wrapper = document.createElement('div');
                wrapper.className = 'mark';
                wrapper.style.transform = `rotate(${rotation}deg)`;
                if (i % 5 === 0) {
                    const tick = document.createElement('div');
                    tick.className = 'tick';
                    const num = document.createElement('div');
                    num.className = 'num';
                    let hour = i / 5;
                    num.textContent = isRoman ? romanNumerals[hour === 12 ? 11 : hour - 1] : hour;
                    num.style.transform = `rotate(${-rotation}deg)`;
                    wrapper.appendChild(tick);
                    wrapper.appendChild(num);
                } else {
                    const minTick = document.createElement('div');
                    minTick.className = 'min-tick';
                    wrapper.appendChild(minTick);
                }
                dial.appendChild(wrapper);
            }
        }

        function updateMoonPhase() {
            const now = new Date();
            const daysSinceEpoch = (now.getTime() - 946684800000) / 86400000;
            const cycle = 29.5305882;
            let phase = ((daysSinceEpoch % cycle) + cycle) % cycle / cycle;
            let color = getComputedStyle(document.documentElement).getPropertyValue('--moon-shadow-color').trim();
            let rotation = phase <= 0.5 ? 0 : 180;
            let shadow = phase <= 0.5 ? (phase * 2) * 100 : ((phase - 0.5) * 2) * 100;
            
            if (phase <= 0.5) {
                moonDisk.style.backgroundImage = `linear-gradient(to right, ${color} 50%, transparent 50%), linear-gradient(to left, ${color} ${100-shadow}%, transparent ${100-shadow}%)`;
            } else {
                moonDisk.style.backgroundImage = `linear-gradient(to right, transparent 50%, ${color} 50%), linear-gradient(to right, ${color} ${100-shadow}%, transparent ${100-shadow}%)`;
            }
            moonDisk.style.transform = `rotate(${rotation}deg)`;
        }

        function updateClock() {
            const now = new Date();
            const zone = timeZones[currentZoneIndex];

            // MAGIN: Använd toLocaleString för att få exakt tid i zonen (inkl. sommar/vintertid)
            const zoneTimeStr = now.toLocaleString("en-US", { timeZone: zone.tz });
            const zDate = new Date(zoneTimeStr);
            
            const h = zDate.getHours();
            const m = zDate.getMinutes();
            const s = zDate.getSeconds();
            const ms = now.getMilliseconds();

            // Svepande visare
            const sDeg = (s + ms/1000) * 6;
            const mDeg = (m + s/60) * 6;
            const hDeg = (h % 12 + m/60) * 30;

            hourHand.style.transform = `translate(-50%,-100%) rotate(${hDeg}deg)`;
            minuteHand.style.transform = `translate(-50%,-100%) rotate(${mDeg}deg)`;
            secondHand.style.transform = `translate(-50%,-100%) rotate(${sDeg}deg)`;

            const pad = n => String(n).padStart(2, '0');
            digital.textContent = `${pad(h)}:${pad(m)}:${pad(s)} (${zone.abbr})`;

            document.getElementById('date-window').textContent = pad(zDate.getDate());
            document.getElementById('day-window').textContent = WEEKDAYS_SV[zDate.getDay()];
            document.getElementById('year-window').textContent = zDate.getFullYear();
            zoneDisplay.textContent = zone.abbr;

            updateMoonPhase();
        }

        // Event Listeners
        document.getElementById('toggleZone').addEventListener('click', () => {
            currentZoneIndex = (currentZoneIndex + 1) % timeZones.length;
            document.getElementById('toggleZone').textContent = `Zon: ${timeZones[currentZoneIndex].abbr}`;
        });

        document.getElementById('toggleFormat').addEventListener('click', () => {
            useRoman = !useRoman;
            createDialMarks(useRoman);
            document.getElementById('toggleFormat').textContent = useRoman ? 'Format: Romerska' : 'Format: Arabiska';
        });

        document.getElementById('toggleSec').addEventListener('click', () => {
            showSecond = !showSecond;
            secondHand.style.display = showSecond ? 'block' : 'none';
            document.getElementById('toggleSec').textContent = showSecond ? 'Dölj sekundvisare' : 'Visa sekundvisare';
        });

        document.getElementById('toggleTheme').addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            document.getElementById('toggleTheme').textContent = document.body.classList.contains('light-mode') ? 'Tema: Mörkt' : 'Tema: Ljust';
        });

        createDialMarks(useRoman);
        setInterval(updateClock, 50); // Uppdatera ofta för mjuk gång
    </script>
</body>
</html>
